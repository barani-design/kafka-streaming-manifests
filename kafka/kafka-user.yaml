apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: kafka-kraft-user
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-kraft
spec:
  authentication:
    type: scram-sha-512
  authorization:
    acls:
      - operations:
          - All
        resource:
          name: '*'
          patternType: literal
          type: topic
      - operations:
          - All
        resource:
          name: '*'
          patternType: literal
          type: group
    type: simple