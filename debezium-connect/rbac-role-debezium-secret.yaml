apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: connect-secret-reader
  namespace: kafka
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["postgres-source-credentials"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: connect-secret-reader-binding
  namespace: kafka
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: connect-secret-reader
subjects:
- kind: ServiceAccount
  name: debezium-connect-cluster-connect   # Strimzi creates this for you
